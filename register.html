<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register / Login — Mental Wellness Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f1e9;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  color: #3e4e3c;
}
.card {
  background: white;
  padding: 35px;
  border-radius: 18px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
  width: 100%;
  max-width: 380px;
}
h1 { text-align: center; color: #5a7d5a; margin-bottom: 5px; }
.subtitle { text-align: center; color: #999; font-size: 14px; margin-bottom: 25px; }
.tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid #eee; }
.tab {
  flex: 1; text-align: center; padding: 10px;
  cursor: pointer; color: #aaa; font-weight: bold; transition: 0.2s;
}
.tab.active { color: #5a7d5a; border-bottom: 3px solid #5a7d5a; margin-bottom: -2px; }
.form { display: none; }
.form.active { display: block; }
label { display: block; margin: 12px 0 4px; font-size: 14px; font-weight: bold; }
input {
  width: 100%; padding: 10px 12px; border: 1px solid #ccc;
  border-radius: 8px; font-size: 15px; box-sizing: border-box; transition: 0.2s;
}
input:focus { outline: none; border-color: #7ca982; box-shadow: 0 0 5px rgba(124,169,130,0.4); }
button {
  margin-top: 20px; width: 100%; padding: 12px;
  background: #7ca982; color: white; border: none;
  border-radius: 10px; font-size: 16px; cursor: pointer; transition: 0.3s;
}
button:hover { background: #5a7d5a; }
#authMsg { margin-top: 15px; text-align: center; font-size: 14px; min-height: 20px; font-weight: bold; }
</style>
</head>
<body>

<div class="card">
  <h1>🌿 Wellness Tracker</h1>
  <p class="subtitle">Track your mood. Reflect daily.</p>

  <div class="tabs">
    <div class="tab active" id="tabRegister">Sign Up</div>
    <div class="tab"        id="tabLogin">Log In</div>
  </div>

  <div class="form active" id="registerForm">
    <label>Name</label>
    <input type="text"     id="regName"     placeholder="Your name" />
    <label>Email</label>
    <input type="email"    id="regEmail"    placeholder="you@email.com" />
    <label>Password</label>
    <input type="password" id="regPassword" placeholder="Min. 6 characters" />
    <button id="registerBtn">Create Account</button>
  </div>

  <div class="form" id="loginForm">
    <label>Email</label>
    <input type="email"    id="loginEmail"    placeholder="you@email.com" />
    <label>Password</label>
    <input type="password" id="loginPassword" placeholder="Your password" />
    <button id="loginBtn">Log In</button>
  </div>

  <p id="authMsg"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  // ✅ CORRECT Firebase Config
  const firebaseConfig = {
    apiKey:            "AIzaSyAMFdAhbM8jMZurek9zwN92LZfM_-Qz3wI",
    authDomain:        "mental-wellness-tracker-5f6f1.firebaseapp.com",
    projectId:         "mental-wellness-tracker-5f6f1",
    storageBucket:     "mental-wellness-tracker-5f6f1.firebasestorage.app",
    messagingSenderId: "421375166970",
    appId:             "1:421375166970:web:a1cdbd9382a546ac80bc43"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  function showMsg(text, isError) {
    const el = document.getElementById("authMsg");
    el.innerText = text;
    el.style.color = isError ? "#c0392b" : "#5a7d5a";
  }

  // Tab switching
  document.getElementById("tabRegister").addEventListener("click", function() {
    document.getElementById("registerForm").classList.add("active");
    document.getElementById("loginForm").classList.remove("active");
    document.getElementById("tabRegister").classList.add("active");
    document.getElementById("tabLogin").classList.remove("active");
    document.getElementById("authMsg").innerText = "";
  });
  document.getElementById("tabLogin").addEventListener("click", function() {
    document.getElementById("loginForm").classList.add("active");
    document.getElementById("registerForm").classList.remove("active");
    document.getElementById("tabLogin").classList.add("active");
    document.getElementById("tabRegister").classList.remove("active");
    document.getElementById("authMsg").innerText = "";
  });

  // REGISTER
  document.getElementById("registerBtn").addEventListener("click", function() {
    const name     = document.getElementById("regName").value.trim();
    const email    = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value;
    if (!name || !email || !password) { showMsg("⚠️ Please fill in all fields.", true); return; }
    showMsg("Creating account...", false);
    auth.createUserWithEmailAndPassword(email, password)
      .then(function(userCredential) {
        return db.collection("users").doc(userCredential.user.uid).set({
          name: name, email: email, createdAt: new Date().toISOString()
        });
      })
      .then(function() {
        showMsg("✅ Account created! Redirecting...", false);
        setTimeout(function() { window.location.href = "index.html"; }, 1500);
      })
      .catch(function(error) { handleError(error); });
  });

  // LOGIN
  document.getElementById("loginBtn").addEventListener("click", function() {
    const email    = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    if (!email || !password) { showMsg("⚠️ Please fill in all fields.", true); return; }
    showMsg("Logging in...", false);
    auth.signInWithEmailAndPassword(email, password)
      .then(function() {
        showMsg("✅ Logged in! Redirecting...", false);
        setTimeout(function() { window.location.href = "index.html"; }, 1500);
      })
      .catch(function(error) { handleError(error); });
  });

  function handleError(error) {
    const messages = {
      "auth/email-already-in-use":   "⚠️ Email already registered. Try logging in.",
      "auth/invalid-email":          "⚠️ Please enter a valid email.",
      "auth/weak-password":          "⚠️ Password must be at least 6 characters.",
      "auth/user-not-found":         "⚠️ No account found with this email.",
      "auth/wrong-password":         "⚠️ Wrong password. Try again.",
      "auth/invalid-credential":     "⚠️ Wrong email or password.",
      "auth/too-many-requests":      "⚠️ Too many attempts. Wait a moment.",
      "auth/network-request-failed": "⚠️ No internet connection."
    };
    showMsg(messages[error.code] || ("⚠️ " + error.message), true);
    console.error(error.code, error.message);
  }
</script>
</body>
</html>
